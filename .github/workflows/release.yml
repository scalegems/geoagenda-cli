name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (ignored if 'version' is set)"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version to release, e.g. v1.2.3 or v1.2.3-rc.1 (overrides 'bump')"
        type: string
        required: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        if: github.event_name == 'workflow_dispatch'
        id: nextver
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.version }}" ]]; then
            NEXT="${{ inputs.version }}"
            if [[ ! "$NEXT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::Invalid version '$NEXT' — expected vMAJOR.MINOR.PATCH[-prerelease]"
              exit 1
            fi
          else
            LATEST=$(git tag -l 'v*' | sort -V | tail -n1 || true)
            if [[ -z "$LATEST" ]]; then
              NEXT="v0.1.0"
            else
              VERSION="${LATEST#v}"
              VERSION="${VERSION%%-*}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              case "${{ inputs.bump }}" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              NEXT="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "::error::Tag $NEXT already exists"
            exit 1
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing $NEXT" >> "$GITHUB_STEP_SUMMARY"

      - name: Tag and push
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          NEXT="${{ steps.nextver.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
