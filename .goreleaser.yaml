# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: geoagenda

before:
  hooks:
    - go mod tidy

builds:
  - id: geoagenda
    main: ./
    binary: geoagenda
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  # github-native delegates to GitHub's "Generate release notes" API, which
  # renders entries as "* PR title by @username in #N" — no author emails,
  # ever. Grouping/filtering can be configured via .github/release.yml.
  use: github-native

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## geoagenda-cli {{ .Tag }}

    The Claude Code plugin auto-downloads the matching binary for your
    OS/arch on install. See the README for manual install instructions.
